<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR generator</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #111;
    --muted: #666;
    --line: #e5e5e5;
    --accent: #111;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 48px 24px 96px; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  p.lead { color: var(--muted); font-size: 14px; margin: 0 0 32px; }
  form { display: flex; gap: 8px; margin-bottom: 32px; }
  input[type=url], input[type=text] {
    flex: 1; padding: 12px 14px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 14px; background: #fff; color: var(--fg);
    font-family: inherit; outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  button {
    padding: 12px 18px; border: 0; border-radius: 8px; background: var(--accent);
    color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: opacity .15s;
  }
  button:hover { opacity: 0.85; }
  button.secondary {
    background: #fff; color: var(--fg); border: 1px solid var(--line);
  }
  .preview {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 32px; display: flex; flex-direction: column; align-items: center; gap: 20px;
    min-height: 280px; justify-content: center;
  }
  .preview .empty { color: var(--muted); font-size: 13px; }
  .preview svg { max-width: 320px; width: 100%; height: auto; display: block; }
  .actions { display: flex; gap: 8px; }
  .err { color: #c00; font-size: 13px; margin-top: 8px; }
  .styles {
    display: inline-flex; gap: 4px; padding: 4px;
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    margin-bottom: 16px;
  }
  .styles button {
    background: transparent; color: var(--muted); padding: 6px 12px;
    font-size: 13px; border-radius: 7px; font-weight: 500;
  }
  .styles button.active { background: var(--accent); color: #fff; }
  .styles button:hover:not(.active) { color: var(--fg); }
  .anim {
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px; font-size: 13px;
  }
  .anim-row { display: flex; align-items: center; gap: 10px; }
  .anim-toggle { display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    font-weight: 500; user-select: none; }
  .anim-toggle input { accent-color: var(--accent); width: 14px; height: 14px; }
  .anim-sliders { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
  .anim-sliders label { display: flex; flex-direction: column; gap: 4px;
    color: var(--muted); font-size: 12px; }
  .anim-sliders .v { color: var(--fg); font-variant-numeric: tabular-nums; font-size: 11px; }
  .anim-sliders input[type=range] { width: 100%; accent-color: var(--accent); margin: 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>QR generator</h1>
  <p class="lead">Paste a URL. Get an SVG with the logo in the center.</p>

  <form id="form">
    <input id="url" type="url" placeholder="https://example.com" required autofocus />
    <button type="submit">Generate</button>
  </form>

  <div class="styles" id="styles" hidden>
    <button type="button" data-style="dots" class="active">Dots</button>
    <button type="button" data-style="rounded">Rounded squares</button>
    <button type="button" data-style="square">Squares</button>
  </div>

  <div class="anim" id="anim" hidden>
    <div class="anim-row">
      <label class="anim-toggle">
        <input type="checkbox" id="animEnabled" />
        Shimmer animation
      </label>
    </div>
    <div class="anim-sliders" id="animSliders" hidden>
      <label>
        <span>Speed <span class="v" id="speedV">2.4s</span></span>
        <input type="range" id="speed" min="0.6" max="6" step="0.1" value="2.4" />
      </label>
      <label>
        <span>Intensity <span class="v" id="intensityV">50%</span></span>
        <input type="range" id="intensity" min="0" max="1" step="0.05" value="0.5" />
      </label>
      <label>
        <span>Size ↔ Fade <span class="v" id="fadeV">50%</span></span>
        <input type="range" id="fade" min="0" max="1" step="0.05" value="0.5" />
      </label>
      <label>
        <span>Wave <span class="v" id="waveV">0.7</span></span>
        <input type="range" id="wave" min="0" max="1.5" step="0.05" value="0.7" />
      </label>
      <label>
        <span>Randomness <span class="v" id="randomnessV">30%</span></span>
        <input type="range" id="randomness" min="0" max="1" step="0.05" value="0.3" />
      </label>
    </div>
  </div>

  <div class="preview" id="preview">
    <div class="empty">QR code will appear here</div>
  </div>

  <div id="err" class="err"></div>
</div>

<script>
// Logo, inlined from Logo.svg — kept as a <g> we can drop into the QR SVG.
const LOGO = {
  width: 134,
  height: 80,
  // raw path content from the original Logo.svg
  paths: `<path fill-rule="evenodd" clip-rule="evenodd" d="M46.4105 0H87.0076V79.9971H46.4105V0ZM0 11.4757H40.5971V80.0015H0V11.4757ZM133.427 0H92.8297V79.9971H133.427V0ZM2.54314e-06 0H40.5971V5.73567H2.54314e-06V0Z" fill="black"/>`
};

function buildQRSvg(text, style = 'dots', anim = null) {
  // Highest error correction so the center can be safely covered by the logo.
  const qr = qrcode(0, 'H');
  qr.addData(text);
  qr.make();

  const n = qr.getModuleCount();
  const margin = 4;
  const size = n + margin * 2;

  // Logo box (matches the logo's own aspect ratio, with generous padding).
  const logoAR = LOGO.width / LOGO.height;
  const logoW = size * 0.26;
  const logoH = logoW / logoAR;
  const pad = 2.8; // modules of breathing room on all sides
  const koW = logoW + pad * 2;
  const koH = logoH + pad * 2;
  const koX = (size - koW) / 2;
  const koY = (size - koH) / 2;
  const koR = Math.min(koW, koH) * 0.18; // softens the cleared area
  const logoX = (size - logoW) / 2;
  const logoY = (size - logoH) / 2;
  const logoScale = logoW / LOGO.width;

  // A module is "in the knockout" if its center sits inside the rounded box.
  const inKnockout = (cx, cy) => {
    if (cx < koX || cx > koX + koW || cy < koY || cy > koY + koH) return false;
    // simple rounded-rect hit test for the four corner regions
    const dx = Math.min(cx - koX, koX + koW - cx);
    const dy = Math.min(cy - koY, koY + koH - cy);
    if (dx >= koR || dy >= koR) return true;
    const ddx = koR - dx, ddy = koR - dy;
    return ddx * ddx + ddy * ddy <= koR * koR;
  };

  const inFinder = (r, c) =>
    (r < 7 && c < 7) ||
    (r < 7 && c >= n - 7) ||
    (r >= n - 7 && c < 7);

  // Data modules — either dots or rounded squares.
  let modulesPath = '';
  if (style === 'rounded' || style === 'square') {
    const off = 0.04;                // inset from cell edge on exterior sides
    const rr = style === 'rounded' ? 0.22 : 0;
    const hasModule = (r, c) => {
      if (r < 0 || c < 0 || r >= n || c >= n) return false;
      if (!qr.isDark(r, c)) return false;
      if (inFinder(r, c)) return false;
      return !inKnockout(c + margin + 0.5, r + margin + 0.5);
    };
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (!hasModule(r, c)) continue;
        const N = hasModule(r - 1, c);
        const E = hasModule(r, c + 1);
        const S = hasModule(r + 1, c);
        const W = hasModule(r, c - 1);
        const left   = c + margin + (W ? 0 : off);
        const right  = c + margin + 1 - (E ? 0 : off);
        const top    = r + margin + (N ? 0 : off);
        const bottom = r + margin + 1 - (S ? 0 : off);
        const tl = (!N && !W) ? rr : 0;
        const tr = (!N && !E) ? rr : 0;
        const br = (!S && !E) ? rr : 0;
        const bl = (!S && !W) ? rr : 0;
        let p = `M${left + tl},${top}H${right - tr}`;
        if (tr) p += `a${tr},${tr} 0 0 1 ${tr},${tr}`;
        p += `V${bottom - br}`;
        if (br) p += `a${br},${br} 0 0 1 ${-br},${br}`;
        p += `H${left + bl}`;
        if (bl) p += `a${bl},${bl} 0 0 1 ${-bl},${-bl}`;
        p += `V${top + tl}`;
        if (tl) p += `a${tl},${tl} 0 0 1 ${tl},${-tl}`;
        modulesPath += p + 'z';
      }
    }
  } else {
    const radius = 0.46;
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (!qr.isDark(r, c)) continue;
        if (inFinder(r, c)) continue;
        const cx = c + margin + 0.5;
        const cy = r + margin + 0.5;
        if (inKnockout(cx, cy)) continue;
        modulesPath += `M${cx - radius},${cy}a${radius},${radius} 0 1,0 ${radius * 2},0a${radius},${radius} 0 1,0 ${-radius * 2},0`;
      }
    }
  }

  // Animated-dots overlay: when enabled, replace the static dots with individual
  // circles that share a CSS keyframe but get position-based animation delays.
  let animSvg = '';
  let animStyle = '';
  if (style === 'dots' && anim && anim.enabled) {
    const radius = 0.46;
    const dur = anim.speed;
    const sizeWeight = 1 - anim.fade;
    const opacityWeight = anim.fade;
    const minScale = (1 - anim.intensity * sizeWeight * 0.85).toFixed(3);
    const minOpacity = (1 - anim.intensity * opacityWeight * 0.9).toFixed(3);
    let circles = '';
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (!qr.isDark(r, c)) continue;
        if (inFinder(r, c)) continue;
        const cx = c + margin + 0.5;
        const cy = r + margin + 0.5;
        if (inKnockout(cx, cy)) continue;
        // Organic wave — three overlapping sines at different frequencies/orientations.
        const w =
          Math.sin(c * 0.42) +
          Math.sin(r * 0.37 + 1.3) +
          Math.sin((c - r) * 0.27 + 0.5);
        const wavePos = (w + 3) / 6;                          // 0..1
        const noise = ((c * 53 + r * 97) % 17) / 17;          // 0..1, deterministic
        const raw = wavePos * anim.wave + noise * anim.randomness;
        const phase = ((raw % 1) + 1) % 1;                    // 0..1
        const delay = (-phase * dur).toFixed(3);              // negative → starts mid-cycle
        circles += `<circle cx="${cx}" cy="${cy}" r="${radius}" style="animation-delay:${delay}s"/>`;
      }
    }
    animSvg = `<g class="dots">${circles}</g>`;
    animStyle = `
    @keyframes shimmer {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(${minScale}); opacity: ${minOpacity}; }
    }
    .dots circle {
      transform-box: fill-box;
      transform-origin: center;
      animation: shimmer ${dur}s ease-in-out infinite;
      fill: #000;
    }`;
    modulesPath = ''; // static path replaced by animated overlay
  }

  // Finder patterns at the three corners — rounding follows the chosen style.
  const finders = [
    [margin, margin],
    [margin + n - 7, margin],
    [margin, margin + n - 7],
  ];
  const finderR = style === 'square' ? [0, 0, 0]
    : style === 'rounded' ? [1.6, 1.1, 0.6]
    : [2.2, 1.6, 0.9];
  let finderSvg = '';
  for (const [x, y] of finders) {
    finderSvg += `
      <rect x="${x}" y="${y}" width="7" height="7" rx="${finderR[0]}" ry="${finderR[0]}" fill="#000"/>
      <rect x="${x + 1}" y="${y + 1}" width="5" height="5" rx="${finderR[1]}" ry="${finderR[1]}" fill="#fff"/>
      <rect x="${x + 2}" y="${y + 2}" width="3" height="3" rx="${finderR[2]}" ry="${finderR[2]}" fill="#000"/>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="512" height="512">
  ${animStyle ? `<style>${animStyle}</style>` : ''}
  <rect width="${size}" height="${size}" fill="#ffffff"/>
  ${modulesPath ? `<path d="${modulesPath}" fill="#000000"/>` : ''}
  ${animSvg}
  ${finderSvg}
  <g transform="translate(${logoX} ${logoY}) scale(${logoScale})">${LOGO.paths}</g>
</svg>`;
}

const form = document.getElementById('form');
const urlInput = document.getElementById('url');
const preview = document.getElementById('preview');
const err = document.getElementById('err');
const stylesEl = document.getElementById('styles');
const animEl = document.getElementById('anim');
const animEnabled = document.getElementById('animEnabled');
const animSliders = document.getElementById('animSliders');
const speedEl = document.getElementById('speed');
const intensityEl = document.getElementById('intensity');
const fadeEl = document.getElementById('fade');
const waveEl = document.getElementById('wave');
const randomnessEl = document.getElementById('randomness');
const speedV = document.getElementById('speedV');
const intensityV = document.getElementById('intensityV');
const fadeV = document.getElementById('fadeV');
const waveV = document.getElementById('waveV');
const randomnessV = document.getElementById('randomnessV');

let currentSvg = '';
let currentUrl = '';
let currentStyle = 'dots';

function animState() {
  return {
    enabled: animEnabled.checked,
    speed: parseFloat(speedEl.value),
    intensity: parseFloat(intensityEl.value),
    fade: parseFloat(fadeEl.value),
    wave: parseFloat(waveEl.value),
    randomness: parseFloat(randomnessEl.value),
  };
}

function updateAnimLabels() {
  speedV.textContent = parseFloat(speedEl.value).toFixed(1) + 's';
  intensityV.textContent = Math.round(parseFloat(intensityEl.value) * 100) + '%';
  fadeV.textContent = Math.round(parseFloat(fadeEl.value) * 100) + '%';
  waveV.textContent = parseFloat(waveEl.value).toFixed(2);
  randomnessV.textContent = Math.round(parseFloat(randomnessEl.value) * 100) + '%';
}

function render(text) {
  err.textContent = '';
  try {
    currentSvg = buildQRSvg(text, currentStyle, animState());
    currentUrl = text;
    stylesEl.hidden = false;
    animEl.hidden = currentStyle !== 'dots';
    animSliders.hidden = !animEnabled.checked;
    preview.innerHTML = currentSvg + `
      <div class="actions">
        <button type="button" id="dl">Download SVG</button>
        <button type="button" class="secondary" id="copy">Copy SVG</button>
      </div>`;
    document.getElementById('dl').addEventListener('click', download);
    document.getElementById('copy').addEventListener('click', copy);
  } catch (e) {
    err.textContent = e.message || String(e);
  }
}

function slugFromUrl(u) {
  try {
    const h = new URL(u).hostname.replace(/^www\./, '');
    return 'qr-' + h.replace(/[^a-z0-9.-]/gi, '-');
  } catch { return 'qr'; }
}

function download() {
  const blob = new Blob([currentSvg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slugFromUrl(currentUrl) + '.svg';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

async function copy() {
  try { await navigator.clipboard.writeText(currentSvg); }
  catch (e) { err.textContent = 'Copy failed: ' + e.message; }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const v = urlInput.value.trim();
  if (!v) return;
  render(v);
});

stylesEl.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-style]');
  if (!btn) return;
  currentStyle = btn.dataset.style;
  for (const b of stylesEl.querySelectorAll('button')) {
    b.classList.toggle('active', b === btn);
  }
  if (currentUrl) render(currentUrl);
});

animEnabled.addEventListener('change', () => {
  animSliders.hidden = !animEnabled.checked;
  if (currentUrl) render(currentUrl);
});
for (const el of [speedEl, intensityEl, fadeEl, waveEl, randomnessEl]) {
  el.addEventListener('input', () => {
    updateAnimLabels();
    if (currentUrl && animEnabled.checked) render(currentUrl);
  });
}
updateAnimLabels();
</script>
</body>
</html>
